{{- if .Values.backupDaemon.install }}
apiVersion: v1
kind: Secret
metadata:
  labels:
    app: backup-daemon
    name: backup-daemon
    cloud-backuper.netcracker.com/backup-daemon-credentials: "true"
    {{ include "kubernetes.labels" . | nindent 4 }}
  name: backup-daemon-credentials
data:
  password: {{ ( include "postgres.adminPassword" . ) | b64enc }}
  username: {{ ( include "postgres.adminUser" . ) | b64enc }}
type: Opaque
{{- end }}
