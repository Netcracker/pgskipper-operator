{{ if and (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1") (eq .Values.PAAS_PLATFORM "KUBERNETES") -}}
{{ if and .Values.powaUI.install .Values.powaUI.ingress.enabled .Values.tls.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: powa-ui-backend-tls-policy
  labels:
    {{ include "kubernetes.labels" . | nindent 4 }}
spec:
  targetRefs:
  - group: ""
    kind: Service
    name: powa-ui
  validation:
    hostname: {{ printf "powa-ui.%s" .Release.Namespace | quote }}
    caCertificateRefs:
    - group: ""
      kind: Secret
      name: {{ include "postgres.certServicesSecret" . }}
{{- end }}
{{- end }}
