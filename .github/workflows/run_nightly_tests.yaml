name: Run Nightly Pgskipper Pipeline

permissions:
  actions: write
  contents: read

on:
  push
#  schedule:
#    - cron: '0 2 * * *'

jobs:
  Nightly-Pgskipper-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/pgskipper.yaml@feat/nightly_pg

    with:
      repository_name: ${{ github.repository }}
      service_branch: '${{ github.head_ref || github.ref_name }}'
      pipeline_branch: 'feat/nightly_pg' #this value must match the value after '@' in 'uses'
      runner_type: 'ubuntu-latest'
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}

