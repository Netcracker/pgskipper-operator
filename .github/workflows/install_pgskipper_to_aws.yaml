name: Install Pgskipper to AWS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment Name"
        required: false
        default: "dev"
      test_scenario:
        description: "Test scenario (e.g. basic, patroniBasic, or empty for default)"
        required: false
        default: "basic"

jobs:
  Install-Pgskipper:
    environment: "${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate required Environment variables
        run: |
          MISSING=""
          [ -z "${{ vars.PGSKIPPER_INSTALL_NAMESPACE }}" ] && MISSING="${MISSING} PGSKIPPER_INSTALL_NAMESPACE"
          [ -z "${{ vars.AWS_CLUSTERNAME }}" ] && MISSING="${MISSING} AWS_CLUSTERNAME"
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && MISSING="${MISSING} AWS_ACCESS_KEY_ID"
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING="${MISSING} AWS_SECRET_ACCESS_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required configuration in Environment '${{ github.event.inputs.environment }}'. Set the following Variables (and Secrets):$MISSING"
            echo "In GitHub: Settings → Environments → ${{ github.event.inputs.environment }} → add Variables: PGSKIPPER_INSTALL_NAMESPACE, AWS_CLUSTERNAME; Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY. Optionally AWS_REGION (default us-east-1)."
            exit 1
          fi
          echo "PGSKIPPER_INSTALL_NAMESPACE=${{ vars.PGSKIPPER_INSTALL_NAMESPACE }}"
          echo "AWS_CLUSTERNAME=${{ vars.AWS_CLUSTERNAME }}"
          echo "AWS_REGION=${{ vars.AWS_REGION || 'us-east-1' }}"

      - name: Listing downloaded files
        run: |
          pwd
          ls -R ./

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.32.0'

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Verify tools
        run: |
          kubectl version --client
          helm version
          aws --version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION || 'us-east-1' }} --name ${{ vars.AWS_CLUSTERNAME }}

      - name: Verify cluster access
        run: kubectl get nodes

      - name: Install Pgskipper (Patroni Services)
        run: |
          # Uninstall Helm releases first (cleans CRs and avoids finalizers blocking namespace deletion)
          echo "Uninstalling Helm releases..."
          helm uninstall pgskipper-patroni -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} --wait --timeout=120s || true
          helm uninstall pgskipper -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} --wait --timeout=120s || true
          
          echo "Deleting namespace..."
          kubectl delete ns ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} --timeout=180s --wait=false || true
          
          echo "Waiting for namespace deletion to complete..."
          for i in $(seq 1 90); do
            if ! kubectl get ns ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} 2>/dev/null; then
              echo "Namespace deleted successfully"
              break
            fi
            
            NS_STATUS=$(kubectl get ns ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            echo "Waiting... ($i/90) - Namespace status: $NS_STATUS"
            
            if [ "$i" -gt 30 ] && [ "$NS_STATUS" = "Terminating" ]; then
              echo "Namespace stuck in Terminating, attempting force delete..."
              kubectl api-resources --verbs=list --namespaced -o name | xargs -n 1 kubectl get --show-kind --ignore-not-found -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o name 2>/dev/null | \
                xargs -n 1 kubectl patch -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
              kubectl get ns ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o json | \
                jq '.spec.finalizers = []' | \
                kubectl replace --raw "/api/v1/namespaces/${{ vars.PGSKIPPER_INSTALL_NAMESPACE }}/finalize" -f - || true
              sleep 5
            fi
            
            sleep 2
          done
          
          if kubectl get ns ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} 2>/dev/null; then
            echo "ERROR: Namespace still exists after timeout!"
            kubectl get ns ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o yaml
            exit 1
          fi
          
          echo "Creating namespace: ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }}"
          kubectl create namespace ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }}
          
          # Operator requires these secrets; chart only creates them when externalDataBase is set
          echo "Creating postgres-credentials and replicator-credentials secrets..."
          kubectl create secret generic postgres-credentials -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} \
            --from-literal=username=postgres \
            --from-literal=password='p@ssWOrD1' \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic replicator-credentials -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} \
            --from-literal=username=replicator \
            --from-literal=password=replicator \
            --dry-run=client -o yaml | kubectl apply -f -
          
          # AWS EKS values: TLS off, securityContext, tests, minimal components for integration tests
          # GLOBAL_SECURITY_CONTEXT: false so operator does not set runAsNonRoot on containers (backup-daemon image runs as root)
          cat << 'VALUESEOF' | sed 's/^          //' > /tmp/pgskipper-aws-values.yaml
          global:
            tls:
              enabled: false
            securityContext: {}
          GLOBAL_SECURITY_CONTEXT: "false"
          operator:
            image: ghcr.io/netcracker/pgskipper-operator:main
          tls:
            enabled: false
          patroni:
            clusterName: patroni
          metricCollector:
            install: true
            dockerImage: ghcr.io/netcracker/pgskipper-docker-monitoring-agent:main
            securityContext: {}
          backupDaemon:
            install: true
            dockerImage: ghcr.io/netcracker/pgskipper-docker-backup-daemon:main
            securityContext:
              runAsNonRoot: false
            storage:
              storageClass: gp2
          tests:
            install: true
            runTestScenarios: basic
            affinity: null
          VALUESEOF
          
          HELM_ARGS=""
          HELM_ARGS="$HELM_ARGS --set tests.runTestScenarios=${{ github.event.inputs.test_scenario || 'basic' }}"
          # Use tests image from this repo (build.yaml pushes to ghcr.io/owner/pgskipper-operator-tests:TAG)
          GITHUB_GROUP=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=$(echo ${{ github.ref }} | sed 's@refs/tags/@@;s@refs/heads/@@;s@/@_@g')
          HELM_ARGS="$HELM_ARGS --set tests.dockerImage=ghcr.io/${GITHUB_GROUP}/pgskipper-operator-tests:${IMAGE_TAG}"
          # ATP/S3 storage for test results (secrets and vars)
          [ -n "${{ secrets.S3_AWS_ACCESS_KEY_ID }}" ] && HELM_ARGS="$HELM_ARGS --set tests.atpStorage.username=${{ secrets.S3_AWS_ACCESS_KEY_ID }}"
          [ -n "${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}" ] && HELM_ARGS="$HELM_ARGS --set tests.atpStorage.password=${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}"
          [ -n "${{ vars.ATP_STORAGE_PROVIDER }}" ] && HELM_ARGS="$HELM_ARGS --set tests.atpStorage.provider=${{ vars.ATP_STORAGE_PROVIDER }}"
          [ -n "${{ vars.ATP_STORAGE_SERVER_URL }}" ] && HELM_ARGS="$HELM_ARGS --set tests.atpStorage.serverUrl=${{ vars.ATP_STORAGE_SERVER_URL }}"
          [ -n "${{ vars.ATP_STORAGE_SERVER_UI_URL }}" ] && HELM_ARGS="$HELM_ARGS --set tests.atpStorage.serverUiUrl=${{ vars.ATP_STORAGE_SERVER_UI_URL }}"
          [ -n "${{ vars.ATP_STORAGE_BUCKET }}" ] && HELM_ARGS="$HELM_ARGS --set tests.atpStorage.bucket=${{ vars.ATP_STORAGE_BUCKET }}"
          [ -n "${{ vars.AWS_REGION }}" ] && HELM_ARGS="$HELM_ARGS --set tests.atpStorage.region=${{ vars.AWS_REGION }}"
          [ -n "${{ vars.ATP_REPORT_VIEW_UI_URL }}" ] && HELM_ARGS="$HELM_ARGS --set tests.atpReportViewUiUrl=${{ vars.ATP_REPORT_VIEW_UI_URL }}"
          ENV_NAME="${{ vars.ENVIRONMENT_NAME }}"
          [ -z "$ENV_NAME" ] && ENV_NAME="${{ github.event.inputs.environment }}"
          [ -n "$ENV_NAME" ] && HELM_ARGS="$HELM_ARGS --set tests.environmentName=$ENV_NAME"
          
          echo "Helm additional args: $HELM_ARGS"
          
          helm install --namespace=${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} \
            --create-namespace \
            -f ./operator/charts/patroni-services/values.yaml \
            -f /tmp/pgskipper-aws-values.yaml \
            pgskipper ./operator/charts/patroni-services \
            $HELM_ARGS
          
          # Install patroni-core so Patroni pods and Service pg-patroni are created (by operator with OPERATOR_ROLE=patroni).
          # Without this, only PatroniServices controller runs and backup daemon has no Postgres to connect to.
          echo "Installing patroni-core chart (PatroniCore CR + patroni-core-operator)..."
          helm install --namespace=${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} \
            --create-namespace \
            -f ./operator/charts/patroni-core/values.yaml \
            --set tls.enabled=false \
            --set patroni.clusterName=patroni \
            --set operator.image=ghcr.io/netcracker/pgskipper-operator:main \
            pgskipper-patroni ./operator/charts/patroni-core
          
          echo "Waiting for operators and Patroni to be ready..."
          kubectl wait --for=condition=ready pod -l name=postgres-operator -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} --timeout=300s || true
          kubectl wait --for=condition=ready pod -l name=patroni-core-operator -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} --timeout=300s || true
          kubectl wait --for=condition=ready pod -l app=patroni -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} --timeout=600s || true
          
          echo "Pgskipper installation completed"
          kubectl get pods -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }}
