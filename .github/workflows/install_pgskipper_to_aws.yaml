name: Install Pgskipper to AWS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment Name"
        required: false
        default: "dev"
      test_scenario:
        description: "Test scenario (e.g. basic, patroniBasic, or empty for default)"
        required: false
        default: "basic"
      repository:
        description: "Repo to checkout (e.g. owner/pgskipper-operator-demo). Empty = this repo (use when running from your fork)."
        required: false
        default: ""
      ref:
        description: "Branch or ref to checkout (e.g. main). Used only if repository is set."
        required: false
        default: "main"

jobs:
  Install-Pgskipper:
    environment: "${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository || github.repository }}
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Validate required Environment variables
        run: |
          MISSING=""
          [ -z "${{ vars.PGSKIPPER_INSTALL_NAMESPACE }}" ] && MISSING="${MISSING} PGSKIPPER_INSTALL_NAMESPACE"
          [ -z "${{ vars.AWS_CLUSTERNAME }}" ] && MISSING="${MISSING} AWS_CLUSTERNAME"
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && MISSING="${MISSING} AWS_ACCESS_KEY_ID"
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING="${MISSING} AWS_SECRET_ACCESS_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required configuration in Environment '${{ github.event.inputs.environment }}'. Set the following Variables (and Secrets):$MISSING"
            echo "In GitHub: Settings → Environments → ${{ github.event.inputs.environment }} → add Variables: PGSKIPPER_INSTALL_NAMESPACE, AWS_CLUSTERNAME; Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY. Optionally AWS_REGION (default us-east-1)."
            exit 1
          fi
          echo "PGSKIPPER_INSTALL_NAMESPACE=${{ vars.PGSKIPPER_INSTALL_NAMESPACE }}"
          echo "AWS_CLUSTERNAME=${{ vars.AWS_CLUSTERNAME }}"
          echo "AWS_REGION=${{ vars.AWS_REGION || 'us-east-1' }}"

      - name: Listing downloaded files
        run: |
          pwd
          ls -R ./

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.32.0'

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Verify tools
        run: |
          kubectl version --client
          helm version
          aws --version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION || 'us-east-1' }} --name ${{ vars.AWS_CLUSTERNAME }}

      - name: Verify cluster access
        run: kubectl get nodes

      - name: Install Pgskipper (Patroni Services)
        run: |
          # Uninstall Helm releases first (cleans CRs and avoids finalizers blocking namespace deletion)
          echo "Uninstalling Helm releases..."
          helm uninstall pgskipper-patroni -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} --wait --timeout=120s || true
          helm uninstall pgskipper -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} --wait --timeout=120s || true
          
          echo "Deleting namespace..."
          kubectl delete ns ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} --timeout=180s --wait=false || true
          
          echo "Waiting for namespace deletion to complete..."
          for i in $(seq 1 90); do
            if ! kubectl get ns ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} 2>/dev/null; then
              echo "Namespace deleted successfully"
              break
            fi
            
            NS_STATUS=$(kubectl get ns ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            echo "Waiting... ($i/90) - Namespace status: $NS_STATUS"
            
            if [ "$i" -gt 30 ] && [ "$NS_STATUS" = "Terminating" ]; then
              echo "Namespace stuck in Terminating, attempting force delete..."
              kubectl api-resources --verbs=list --namespaced -o name | xargs -n 1 kubectl get --show-kind --ignore-not-found -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o name 2>/dev/null | \
                xargs -n 1 kubectl patch -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
              kubectl get ns ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o json | \
                jq '.spec.finalizers = []' | \
                kubectl replace --raw "/api/v1/namespaces/${{ vars.PGSKIPPER_INSTALL_NAMESPACE }}/finalize" -f - || true
              sleep 5
            fi
            
            sleep 2
          done
          
          if kubectl get ns ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} 2>/dev/null; then
            echo "ERROR: Namespace still exists after timeout!"
            kubectl get ns ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o yaml
            exit 1
          fi
          
          echo "Creating namespace: ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }}"
          kubectl create namespace ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }}
          
          # Operator requires these secrets; chart only creates them when externalDataBase is set
          echo "Creating postgres-credentials and replicator-credentials secrets..."
          kubectl create secret generic postgres-credentials -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} \
            --from-literal=username=postgres \
            --from-literal=password='p@ssWOrD1' \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic replicator-credentials -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} \
            --from-literal=username=replicator \
            --from-literal=password=replicator \
            --dry-run=client -o yaml | kubectl apply -f -
          
          # Image registry/tag from the repo that triggered the workflow (your fork = your images)
          GITHUB_GROUP=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=$(echo ${{ github.ref }} | sed 's@refs/tags/@@;s@refs/heads/@@;s@/@_@g')
          echo "Using images: ghcr.io/${GITHUB_GROUP}/...:${IMAGE_TAG}"
          
          # AWS EKS values: TLS off, securityContext, tests, minimal components for integration tests
          # GLOBAL_SECURITY_CONTEXT: false so operator does not set runAsNonRoot on containers (backup-daemon image runs as root)
          cat << 'VALUESEOF' | sed 's/^          //' > /tmp/pgskipper-aws-values.yaml
          global:
            tls:
              enabled: false
            securityContext: {}
          GLOBAL_SECURITY_CONTEXT: "false"
          tls:
            enabled: false
          patroni:
            clusterName: patroni
          metricCollector:
            install: true
            securityContext: {}
          backupDaemon:
            install: true
            securityContext:
              runAsNonRoot: false
            storage:
              storageClass: gp2
          tests:
            install: true
            runTestScenarios: basic
            affinity: null
          VALUESEOF
          
          ENV_NAME="${{ vars.ENVIRONMENT_NAME }}"
          [ -z "$ENV_NAME" ] && ENV_NAME="${{ github.event.inputs.environment }}"
          AWS_REGION="${{ vars.AWS_REGION }}"
          [ -z "$AWS_REGION" ] && AWS_REGION="us-east-1"
          ATP_PROVIDER="${{ vars.ATP_STORAGE_PROVIDER }}"
          [ -z "$ATP_PROVIDER" ] && ATP_PROVIDER="aws"
          # Tests image + ATP/S3 storage for test results (used by both patroni-services and patroni-core).
          # Always set provider and region so integrationTests.env is never empty (chart needs at least one of env/environmentName/atpStorage.provider).
          TESTS_ATP_ARGS="--set tests.dockerImage=ghcr.io/${GITHUB_GROUP}/pgskipper-operator-tests:${IMAGE_TAG}"
          TESTS_ATP_ARGS="$TESTS_ATP_ARGS --set tests.atpStorage.provider=${ATP_PROVIDER}"
          TESTS_ATP_ARGS="$TESTS_ATP_ARGS --set tests.atpStorage.region=${AWS_REGION}"
          [ -n "${{ secrets.S3_AWS_ACCESS_KEY_ID }}" ] && TESTS_ATP_ARGS="$TESTS_ATP_ARGS --set tests.atpStorage.username=${{ secrets.S3_AWS_ACCESS_KEY_ID }}"
          [ -n "${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}" ] && TESTS_ATP_ARGS="$TESTS_ATP_ARGS --set tests.atpStorage.password=${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}"
          [ -n "${{ vars.ATP_STORAGE_SERVER_URL }}" ] && TESTS_ATP_ARGS="$TESTS_ATP_ARGS --set tests.atpStorage.serverUrl=${{ vars.ATP_STORAGE_SERVER_URL }}"
          [ -n "${{ vars.ATP_STORAGE_SERVER_UI_URL }}" ] && TESTS_ATP_ARGS="$TESTS_ATP_ARGS --set tests.atpStorage.serverUiUrl=${{ vars.ATP_STORAGE_SERVER_UI_URL }}"
          [ -n "${{ vars.ATP_STORAGE_BUCKET }}" ] && TESTS_ATP_ARGS="$TESTS_ATP_ARGS --set tests.atpStorage.bucket=${{ vars.ATP_STORAGE_BUCKET }}"
          [ -n "${{ vars.ATP_REPORT_VIEW_UI_URL }}" ] && TESTS_ATP_ARGS="$TESTS_ATP_ARGS --set tests.atpReportViewUiUrl=${{ vars.ATP_REPORT_VIEW_UI_URL }}"
          [ -n "$ENV_NAME" ] && TESTS_ATP_ARGS="$TESTS_ATP_ARGS --set tests.environmentName=$ENV_NAME"
          
          HELM_ARGS=""
          HELM_ARGS="$HELM_ARGS --set operator.image=ghcr.io/${GITHUB_GROUP}/pgskipper-operator:${IMAGE_TAG}"
          HELM_ARGS="$HELM_ARGS --set metricCollector.dockerImage=ghcr.io/${GITHUB_GROUP}/pgskipper-docker-monitoring-agent:${IMAGE_TAG}"
          HELM_ARGS="$HELM_ARGS --set backupDaemon.dockerImage=ghcr.io/${GITHUB_GROUP}/pgskipper-docker-backup-daemon:${IMAGE_TAG}"
          HELM_ARGS="$HELM_ARGS --set tests.runTestScenarios=${{ github.event.inputs.test_scenario || 'basic' }}"
          HELM_ARGS="$HELM_ARGS $TESTS_ATP_ARGS"
          
          echo "Helm additional args: $HELM_ARGS"
          
          helm install --namespace=${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} \
            --create-namespace \
            -f ./operator/charts/patroni-services/values.yaml \
            -f /tmp/pgskipper-aws-values.yaml \
            pgskipper ./operator/charts/patroni-services \
            $HELM_ARGS
          
          # Install patroni-core so Patroni pods and Service pg-patroni are created (by operator with OPERATOR_ROLE=patroni).
          # Without this, only PatroniServices controller runs and backup daemon has no Postgres to connect to.
          # patroni.fsGroup=26 so data volume is writable by postgres user (GID 26), avoids "Permission denied" on /var/lib/pgsql/data.
          echo "--- Chart CR manifest (patroni.securityContext must appear) ---"
          helm template pgskipper-patroni ./operator/charts/patroni-core -f ./operator/charts/patroni-core/values.yaml --set patroni.fsGroup=26 --set createCredentials=false -s templates/cr.yaml 2>/dev/null | grep -A3 securityContext || echo "(no securityContext in rendered CR - check cr.yaml and values)"
          echo "--- PatroniCore integrationTests (env here will be in the test pod; if empty, set ATP/S3 vars in Environment) ---"
          helm template pgskipper-patroni ./operator/charts/patroni-core -f ./operator/charts/patroni-core/values.yaml --set patroni.fsGroup=26 --set createCredentials=false $TESTS_ATP_ARGS -s templates/cr.yaml 2>/dev/null | grep -A200 "integrationTests:" | head -120
          echo "Installing patroni-core chart (PatroniCore CR + patroni-core-operator)..."
          helm install --namespace=${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} \
            --create-namespace \
            -f ./operator/charts/patroni-core/values.yaml \
            --set tls.enabled=false \
            --set patroni.clusterName=patroni \
            --set operator.image=ghcr.io/${GITHUB_GROUP}/pgskipper-operator:${IMAGE_TAG} \
            --set patroni.dockerImage=ghcr.io/${GITHUB_GROUP}/pgskipper-docker-patroni-16:${IMAGE_TAG} \
            --set patroni.storage.storageClass=gp2 \
            --set patroni.fsGroup=26 \
            --set patroni.securityContext.fsGroup=26 \
            --set GLOBAL_SECURITY_CONTEXT="false" \
            --set createCredentials=false \
            $TESTS_ATP_ARGS \
            pgskipper-patroni ./operator/charts/patroni-core
          
          echo "State after patroni-core install (diagnostics)..."
          echo "--- Checkout ref (chart source): ${{ github.ref }} ${{ github.sha }} ---"
          echo "--- PatroniCore spec.integrationTests (env here must appear in test pod) ---"
          kubectl get patronicore -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o yaml 2>/dev/null | grep -A300 "integrationTests:" | head -120 || echo "(no integrationTests in CR)"
          echo "--- PatroniCore spec.patroni (securityContext must have fsGroup: 26) ---"
          kubectl get patronicore -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o jsonpath='{.items[0].spec.patroni}' 2>/dev/null | python3 -m json.tool 2>/dev/null || kubectl get patronicore -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o yaml 2>/dev/null | head -80
          echo "--- StatefulSet pod template securityContext ---"
          kubectl get statefulset -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -l pgcluster=patroni -o jsonpath='{.items[0].spec.template.spec.securityContext}' 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "(none or not found)"
          kubectl get pods -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o wide
          kubectl get patronicores -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} 2>/dev/null || true
          kubectl get statefulset,svc,pvc -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} 2>/dev/null || true
          POD=$(kubectl get pods -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -l name=patroni-core-operator -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$POD" ]; then
            echo "--- patroni-core-operator pod status ---"
            kubectl get pod "$POD" -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o wide
            if [ "$(kubectl get pod "$POD" -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -o jsonpath='{.status.phase}' 2>/dev/null)" != "Running" ]; then
              echo "--- describe (patroni-core-operator not Running) ---"
              kubectl describe pod "$POD" -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} | tail -80
              echo "--- logs ---"
              kubectl logs "$POD" -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} --tail=100 2>/dev/null || true
            fi
          else
            echo "No patroni-core-operator pod found."
          fi
          
          echo "Waiting for operators and Patroni to be ready..."
          kubectl wait --for=condition=ready pod -l name=postgres-operator -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} --timeout=300s || true
          kubectl wait --for=condition=ready pod -l name=patroni-core-operator -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} --timeout=300s || true
          kubectl wait --for=condition=ready pod -l app=patroni -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} --timeout=600s || true
          
          echo "--- StatefulSet securityContext (after operator reconcile; must have fsGroup: 26) ---"
          kubectl get statefulset -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }} -l pgcluster=patroni -o jsonpath='{.items[0].spec.template.spec.securityContext}' 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "(none or not found)"
          echo "Pgskipper installation completed"
          kubectl get pods -n ${{ vars.PGSKIPPER_INSTALL_NAMESPACE }}
